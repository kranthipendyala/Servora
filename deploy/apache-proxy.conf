# Servora - Apache Reverse Proxy Config
# Add this to the vhost config for obesityworldconference.com
#
# Location: /etc/apache2/conf.d/userdata/ssl/2_4/USERNAME/obesityworldconference.com/servora.conf
# After adding, run: /scripts/rebuildhttpdconf && service httpd restart

# ─── PHP API: served directly by Apache ───────────────────────────
# /servora/api/ is handled by Apache + PHP (CodeIgniter 3)
# The .htaccess inside the api/ folder handles CI3 routing

ProxyPreserveHost On
RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
RequestHeader set X-Forwarded-Proto "https"

# IMPORTANT: Exclude /servora/api from proxy — let Apache/PHP handle it
ProxyPass /servora/api !

# ─── Next.js SSR: reverse proxy to Node.js ────────────────────────
# Everything else under /servora goes to Node.js on port 3001
ProxyPass /servora http://127.0.0.1:3001/servora
ProxyPassReverse /servora http://127.0.0.1:3001/servora

# ─── Static assets from Next.js ───────────────────────────────────
ProxyPass /servora/_next http://127.0.0.1:3001/servora/_next
ProxyPassReverse /servora/_next http://127.0.0.1:3001/servora/_next
